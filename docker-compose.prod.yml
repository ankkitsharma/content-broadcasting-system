services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-content_broadcasting}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
      DEFAULT_ROTATION_MINUTES: ${DEFAULT_ROTATION_MINUTES:-5}
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - uploads_prod:/app/uploads

volumes:
  pgdata_prod:
  uploads_prod:

